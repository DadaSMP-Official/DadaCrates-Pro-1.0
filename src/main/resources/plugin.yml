name: DadaCratesPro
version: "1.0"
main: it.dadasmp.dadacrates.DadaCratesPlugin
api-version: "1.20"
author: DadaSMP
description: DadaCratesPro 1.0 - plugin crates completo con GUI, key, premi e animazioni.
commands:
  dadacrates:
    description: Comando principale di DadaCratesPro
    aliases: [dcrates, crate, crates, lootcrate, loot]
    usage: /dadacrates
    permission: dadacrates.admin
    permission-message: "§cNon hai il permesso."
permissions:
  dadacrates.admin:
    description: Permette di modificare crate, key, reward e impostazioni.
    default: op
  dadacrates.use:
    description: Permette di aprire le crate.
    default: op
  dadacrates.open.*:
    description: Permette di aprire tutte le crate configurate.
    default: op
